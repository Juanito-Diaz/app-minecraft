<ion-header class="ion-no-border">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-button (click)="cerrar()" color="success">
        <ion-icon name="close-outline" style="font-size: 24px; font-weight: 800;"></ion-icon>
      </ion-button>
    </ion-buttons>
    <ion-title class="mc-toolbar-title">JUGADORES</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>
  <div class="mc-section-header">
    <h1 class="mc-title">{{ id_jugador ? 'EDITAR' : 'NUEVO' }}<br>JUGADOR</h1>
    <div class="mc-divider"></div>
  </div>

  <div class="ion-padding">
    <form [formGroup]="jugadorForm" (ngSubmit)="guardarDatos()">
      
      <div class="mc-form-group">
        <label class="mc-label">USERNAME</label>
        <ion-input type="text" formControlName="username" class="mc-input-field" placeholder="Ej. Girun"></ion-input>
      </div>

      <div class="mc-form-group">
        <label class="mc-label">NIVEL XP</label>
        <ion-input type="number" formControlName="nivel_xp" class="mc-input-field"></ion-input>
      </div>

      <div class="mc-form-group">
        <label class="mc-label">FECHA DE UNIÓN</label>
        <ion-input type="date" formControlName="fecha_union" class="mc-input-field"></ion-input>
      </div>

      <div class="mc-form-group">
        <label class="mc-label">AVATAR DEL JUGADOR</label>
        <input type="file" formControlName="foto" (change)="onFileSelected($event)" accept="image/*" class="mc-input-field" style="padding: 10px;" />
      </div>

      <div class="mc-form-group" *ngIf="mundosCargados">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
          <label class="mc-label" style="margin-bottom: 0;">MUNDOS</label>
          <ion-button size="small" color="success" (click)="agregarMundo()">
            <ion-icon name="add-outline" slot="start"></ion-icon> Agregar
          </ion-button>
        </div>

        <div formArrayName="mundos">
            <div *ngFor="let matCtrl of mundosFA.controls; let i = index" style="display: flex; gap: 8px; align-items: center; margin-bottom: 10px;">
                <ion-select [formControlName]="i" class="mc-input-field" placeholder="Seleccione un mundo" style="flex: 1;">
                    <ion-select-option *ngFor="let mundo of mundos" [value]="mundo.id">{{ mundo.nombre }}</ion-select-option>
                </ion-select>
                <ion-button fill="clear" color="danger" (click)="eliminarMundo(i)">
                  <ion-icon name="trash" style="font-size: 20px;"></ion-icon>
                </ion-button>
            </div>
        </div>
      </div>

      <div class="mc-form-actions">
        <button type="submit" 
                [disabled]="!jugadorForm.valid"
                class="mc-btn btn-primary">
          {{ id_jugador ? 'ACTUALIZAR DATOS' : 'CREAR JUGADOR' }}
        </button>

        <button *ngIf="id_jugador" type="button" (click)="alertEliminar(id_jugador)" class="mc-btn btn-danger" style="background:#ffdada; border-bottom:4px solid #c0392b;">
          ELIMINAR JUGADOR
        </button>
      </div>
    </form>
  </div>
</ion-content>
