<ion-header class="ion-no-border">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/mundos-listado" color="success" text=""></ion-back-button>
    </ion-buttons>
    <ion-title class="mc-toolbar-title">MUNDOS</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>
  <!-- Cabecera de Formulario -->
  <div class="mc-section-header">
    <p class="mc-overline">
    </p>
    <h1 class="mc-title">NUEVO MUNDO</h1>
  </div>

  <div class="ion-padding">
    <!-- Formulario para Administrador / Edición -->
    <form *ngIf="!isPlayer || id_mundo" [formGroup]="mundoForm" (ngSubmit)="guardarDatos()">
      
      <div class="mc-form-group">
        <label class="mc-label">NOMBRE DEL MUNDO</label>
        <ion-input type="text" formControlName="nombre" class="mc-input-field" placeholder="Ej. Mi Aventura"></ion-input>
      </div>

      <div class="mc-form-group">
        <label class="mc-label">SEMILLA (SEED)</label>
        <ion-input type="text" formControlName="semilla" class="mc-input-field" placeholder="123456789"></ion-input>
      </div>

      <div class="mc-form-group">
        <label class="mc-label">DIFICULTAD</label>
        <ion-select formControlName="dificultad" interface="popover" placeholder="Seleccionar..." class="mc-select-field">
          <ion-select-option *ngFor="let d of dificultades" [value]="d.id">
            {{ d.nombre }}
          </ion-select-option>
        </ion-select>
      </div>

      <div class="mc-form-actions">
        <button type="submit" 
                [disabled]="!mundoForm.valid"
                class="mc-btn btn-primary">
          CREAR MUNDO
          <ion-icon name="checkmark-circle-outline"></ion-icon>
        </button>

        <button type="button" (click)="cerrar()" class="mc-btn btn-danger">
          CANCELAR
        </button>
      </div>
    </form>

    <!-- Formulario para Jugador (Unirse a Mundo existente) -->
    <div *ngIf="isPlayer && !id_mundo">
      <div class="mc-form-group">
        <label class="mc-label">SELECCIONAR MUNDO</label>
        <ion-select [(ngModel)]="selectedMundoId" interface="popover" placeholder="Selecciona un mundo..." class="mc-select-field">
          <ion-select-option *ngFor="let m of todosMundos" [value]="m.id">
            {{ m.nombre }} (Semilla: {{ m.semilla || 'N/A' }} - {{ m.dificultad || 'Normal' }})
          </ion-select-option>
        </ion-select>
        <p *ngIf="todosMundos.length === 0" style="color: #ef4444; font-weight: bold; margin-top: 10px;">
          Ya estás en todos los mundos disponibles en el servidor.
        </p>
      </div>

      <div class="mc-form-actions">
        <button (click)="guardarDatos()" 
                [disabled]="!selectedMundoId"
                class="mc-btn btn-primary">
          UNIRSE AL MUNDO
          <ion-icon name="checkmark-circle-outline"></ion-icon>
        </button>

        <button type="button" (click)="cerrar()" class="mc-btn btn-danger">
          CANCELAR
        </button>
      </div>
    </div>
  </div>
</ion-content>
