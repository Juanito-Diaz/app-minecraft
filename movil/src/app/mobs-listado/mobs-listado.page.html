<app-toolbar nombre="Mobs" color="light"></app-toolbar>

<ion-content>
  <!-- Cabecera de Sección -->
  <div class="mc-section-header">
    <h1 class="mc-title">BESTIARIO<br>DE MOBS</h1>
    <div class="mc-divider"></div>
  </div>

  <div class="ion-padding-horizontal">
    <ion-searchbar 
      [debounce]="1000" 
      (ionInput)="handleInput($event)" 
      placeholder="Buscar por tipo o comportamiento..."
      class="mc-searchbar">
    </ion-searchbar>
  </div>
  
  <div class="mc-container">
    <div *ngFor="let mob of mobs" class="mc-card">
      <div class="mc-card-header">
        <h2 class="mc-card-title">{{ mob.tipo }}</h2>
      </div>
      
      <p class="mc-card-seed" [style.color]="mob.es_hostil ? '#c0392b' : '#2a7a4a'">COMPORTAMIENTO: {{ mob.es_hostil ? 'HOSTIL' : 'PASIVO' }}</p>

      <div class="mc-card-actions" style="margin-top: 15px;">
        <button class="mc-btn btn-primary" [routerLink]="['/mobs-detalle', mob.id]">
          VER DETALLES
        </button>
        <button class="mc-btn btn-secondary" (click)="editar(mob.id)">
          EDITAR
        </button>
        <button class="mc-btn btn-danger" (click)="alertEliminar(mob.id)">
          ELIMINAR
        </button>
      </div>
    </div>
  </div>

  <div style="margin-bottom: 100px; margin-top: 20px;" class="ion-padding">
    <app-paginacion *ngIf="total > 0" [total]="total" [porPagina]="20" (click)="pagina($event)"></app-paginacion>
  </div>

  <div class="mc-fab" (click)="new()">
    <ion-icon name="add"></ion-icon>
  </div>

</ion-content>
