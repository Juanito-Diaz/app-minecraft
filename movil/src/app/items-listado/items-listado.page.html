<app-toolbar nombre="Ítems" color="light"></app-toolbar>

<ion-content>
  <!-- Cabecera de Sección -->
  <div class="mc-section-header">
    <h1 class="mc-title">CATÁLOGO DE<br>ÍTEMS</h1>
    <div class="mc-divider"></div>
  </div>

  <div class="ion-padding-horizontal">
    <ion-searchbar 
      [debounce]="1000" 
      (ionInput)="handleInput($event)" 
      placeholder="Buscar ítem..."
      class="mc-searchbar">
    </ion-searchbar>
  </div>

  <!-- Listado -->
  <div class="mc-container">
    <div *ngFor="let item of items" class="mc-card">
      <div class="mc-card-header">
        <h2 class="mc-card-title">{{ item.nombre }}</h2>
      </div>
      
      <p class="mc-card-seed">ATAQUE: {{ item.puntos_ataque }}</p>
      <p class="mc-card-seed" style="color: #1b5e20;">APILABLE: {{ item.es_apilable ? 'SÍ' : 'NO' }}</p>

      <div class="mc-card-actions" style="margin-top: 15px;">
        <button class="mc-btn btn-primary" (click)="irAlDetalle(item.id)">
          VER DETALLES
        </button>
        <button class="mc-btn btn-secondary" (click)="abrirFormulario(item.id)">
          EDITAR
        </button>
        <button class="mc-btn btn-danger" (click)="alertEliminar(item.id)">
          ELIMINAR
        </button>
      </div>
    </div>
  </div>

  <!-- Paginación -->
  <div class="ion-padding" style="margin-bottom: 80px;">
    <app-paginacion *ngIf="total > 0" [total]="total" [porPagina]="20" (click)="pagina($event)"></app-paginacion>
  </div>

  <!-- FAB -->
  <div class="mc-fab" (click)="abrirFormulario()">
    <ion-icon name="add"></ion-icon>
  </div>
</ion-content>
