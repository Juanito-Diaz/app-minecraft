<app-toolbar nombre="Mundos" color="light"></app-toolbar>

<ion-content>
  <!-- Cabecera de Sección -->
  <div class="mc-section-header">
    <h1 class="mc-title">EXPLORA<br>TUS REINOS</h1>
    <div class="mc-divider"></div>
  </div>

  <!-- Listado de Mundos -->
  <div class="mundos-container">
    <div *ngFor="let m of mundos" class="mc-card">
      <div class="mc-card-header">
        <h2 class="mc-card-title">{{ m.nombre }}</h2>
      </div>
      
      <p class="mc-card-seed">SEMILLA: {{ m.semilla }}</p>
      <p class="mc-card-difficulty">DIFICULTAD: {{ m.dificultad }}</p>

      <div class="mc-card-actions">
        <button class="mc-btn btn-primary" [routerLink]="['/mundos-detalle', m.id]">
          VER DETALLES
        </button>
        <button class="mc-btn btn-secondary" (click)="edit(m.id)">
          EDITAR
        </button>
        <button class="mc-btn btn-danger" (click)="eliminarMundo(m.id, m.nombre)">
          ELIMINAR
        </button>
      </div>
    </div>
  </div>

  <!-- Paginación con estilo ajustado -->
  <div class="ion-padding" style="margin-bottom: 80px;">
    <app-paginacion *ngIf="total > 0" [total]="total" [porPagina]="20" (click)="pagina($event)"></app-paginacion>
  </div>

  <!-- FAB Cuadrado Estilo Minecraft -->
  <div class="mc-fab" (click)="new()">
    <ion-icon name="add"></ion-icon>
  </div>
</ion-content>
