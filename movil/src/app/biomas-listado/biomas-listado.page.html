<app-toolbar nombre="Biomas" color="light"></app-toolbar>

<ion-content>
  <!-- Cabecera de Sección -->
  <div class="mc-section-header">
    <h1 class="mc-title">EXPLORA<br>TUS BIOMAS</h1>
    <div class="mc-divider"></div>
  </div>

  <div class="ion-padding-horizontal">
    <ion-searchbar 
      [debounce]="1000" 
      (ionInput)="handleInput($event)" 
      placeholder="Buscar bioma..."
      class="mc-searchbar">
    </ion-searchbar>
  </div>

  <!-- Listado de Biomas -->
  <div class="mc-container">
    <div *ngFor="let bioma of biomas" class="mc-card">
      <div class="mc-card-header">
        <h2 class="mc-card-title">{{ bioma.nombre }}</h2>
      </div>
      
      <p class="mc-card-seed">TEMPERATURA: {{ bioma.temperatura }}°C</p>

      <div class="mc-card-actions" style="margin-top: 15px;">
        <button class="mc-btn btn-primary" [routerLink]="['/biomas-detalle', bioma.id]">
          VER DETALLES
        </button>
        <button class="mc-btn btn-secondary" (click)="editar(bioma.id)">
          EDITAR
        </button>
        <button class="mc-btn btn-danger" (click)="alertEliminar(bioma.id, bioma.nombre)">
          ELIMINAR
        </button>
      </div>
    </div>
  </div>

  <!-- Paginación con estilo ajustado -->
  <div class="ion-padding" style="margin-bottom: 80px;">
    <app-paginacion *ngIf="total > 0" [total]="total" [porPagina]="20" (click)="pagina($event)"></app-paginacion>
  </div>

  <!-- FAB Cuadrado Estilo Minecraft -->
  <div class="mc-fab" (click)="new()">
    <ion-icon name="add"></ion-icon>
  </div>
</ion-content>
