<ion-header class="ion-no-border">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/mundos-listado" color="success" text=""></ion-back-button>
    </ion-buttons>
    <ion-title class="mc-toolbar-title">MUNDOS</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>
  <!-- Cabecera Principal -->
  <div class="mc-detail-header">
    <div class="mc-header-container">
      <p class="mc-overline">EXPLORANDO</p>
      <h1 class="mc-main-title">{{ mundo.nombre }}</h1>
    </div>
  </div>

  <!-- Bloques de Información -->
  <div class="mc-info-grid">
    <div class="mc-info-block block-white">
      <p class="mc-info-label">SEED</p>
      <p class="mc-info-value">{{ mundo.semilla }}</p>
    </div>
    
    <div class="mc-info-block block-grey">
      <p class="mc-info-label">MODE</p>
      <p class="mc-info-value">{{ mundo.tipo_mundo || 'Survival' }}</p>
    </div>

    <div class="mc-info-block block-dark-grey">
      <p class="mc-info-label">DIFICULTAD</p>
      <p class="mc-info-value">{{ mundo.dificultad }}</p>
    </div>
  </div>

  <!-- Sección de Biomas -->
  <div class="mc-biomas-section">
    <div class="mc-section-title-container">
      <h2 class="mc-section-title">BIOMAS</h2>
      <div class="mc-title-line"></div>
    </div>

    <div class="mc-biomas-list">
      <div *ngFor="let bioma of mundo.biomas" class="bioma-item">
        {{ bioma.nombre }}
      </div>
      <p *ngIf="!mundo.biomas || mundo.biomas.length === 0" class="empty-msg">
        No hay biomas descubiertos.
      </p>
    </div>
  </div>

  <!-- Sección de Jugadores (Mantenida discretamente si existe) -->
  <div *ngIf="mundo.jugadors && mundo.jugadors.length > 0" class="mc-players-section">
    <h2 class="mc-section-title">JUGADORES</h2>
    <div class="mc-players-list">
      <div *ngFor="let j of mundo.jugadors" class="player-item">
        {{ j.username }} - LVL {{ j.nivel_xp }}
      </div>
    </div>
  </div>

</ion-content>
