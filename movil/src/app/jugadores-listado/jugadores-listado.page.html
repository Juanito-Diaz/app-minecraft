<app-toolbar nombre="Jugadores" color="light"></app-toolbar>

<ion-content>
  <!-- Cabecera de Sección -->
  <div class="mc-section-header">
    <h1 class="mc-title">CONOCE A<br>LOS JUGADORES</h1>
    <div class="mc-divider"></div>
  </div>

  <div class="ion-padding-horizontal">
    <ion-searchbar 
      [debounce]="1000" 
      (ionInput)="handleInput($event)" 
      placeholder="Buscar jugador..."
      class="mc-searchbar">
    </ion-searchbar>
  </div>

  <!-- Listado -->
  <div class="mc-container">
    <div *ngFor="let j of jugadores" class="mc-card">
      <div class="mc-card-header" style="display: flex; align-items: center; gap: 15px;">
        <img [src]="'http://localhost:8080/imagenes/jugadores/' + (j.foto ? j.foto : 'jugador_default.png')" alt="avatar" style="width: 50px; height: 50px; border-radius: 5px; object-fit: cover; border: 2px solid #2a7a4a;">
        <h2 class="mc-card-title" style="margin: 0;">{{ j.username }}</h2>
      </div>
      
      <p class="mc-card-seed">NIVEL XP: {{ j.nivel_xp || 0 }}</p>
      <p class="mc-card-seed" style="color: #1b5e20;">UNIDO: {{ j.fecha_union | date:'shortDate' }}</p>

      <div class="mc-card-actions" style="margin-top: 15px;">
        <button class="mc-btn btn-primary" [routerLink]="['/jugadores-detalle', j.id]">
          VER DETALLES
        </button>
        <button class="mc-btn btn-secondary" (click)="editar(j.id)">
          EDITAR
        </button>
        <button *ngIf="permisoService.has('jugadores-eliminar')" class="mc-btn btn-danger" (click)="alertEliminar(j.id, j.username)">
          ELIMINAR
        </button>
      </div>
    </div>
  </div>

  <div class="ion-padding" style="margin-bottom: 80px;">
    <app-paginacion *ngIf="total > 0" [total]="total" [porPagina]="20" (click)="pagina($event)"></app-paginacion>
    <p *ngIf="total === 0" style="color: #666; text-align: center; font-size: 0.9em; font-weight: bold;">
      No se encontraron jugadores.
    </p>
  </div>

  <!-- FAB Cuadrado Estilo Minecraft -->
  <div class="mc-fab" (click)="nuevo()">
    <ion-icon name="add"></ion-icon>
  </div>
</ion-content>
