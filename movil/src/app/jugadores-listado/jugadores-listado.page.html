<app-toolbar nombre="Lista de Jugadores" color="tertiary"></app-toolbar>

<ion-content style="--background: #000;">

  <ion-searchbar 
    [debounce]="1000" 
    (ionInput)="handleInput($event)" 
    placeholder="Buscar jugador..."
    style="--background: #1e1e1e; --color: #ffffff; padding: 10px;">
  </ion-searchbar>

  <ion-list style="background: transparent; padding: 10px;">
    <ion-item *ngFor="let j of jugadores" 
              style="--background: #1e1e1e; --color: #ffffff; margin-bottom: 12px; border-radius: 12px; --border-style: none;">
      
      <ion-avatar slot="start">
        <img src="https://api.dicebear.com/7.x/avataaars/svg?seed={{j.username}}" alt="avatar" />
      </ion-avatar>
      
      <ion-label>
        <h2 style="font-weight: bold; color: #2dd36f;">{{ j.username }}</h2>
        <p style="color: #a0a0a0;">Nivel XP: {{ j.nivel_xp || 0 }} | Unido: {{ j.fecha_union | date:'shortDate' }}</p>
      </ion-label>

      <ion-buttons slot="end">
        <ion-button [routerLink]="['/jugadores-detalle', j.id]" fill="clear" style="--color: #3880ff;">
          <ion-icon name="search-outline" slot="icon-only"></ion-icon>
        </ion-button>
        <ion-button (click)="editar(j.id)" fill="clear" style="--color: #ffc409;">
          <ion-icon name="pencil-outline" slot="icon-only"></ion-icon>
        </ion-button>
        <ion-button (click)="alertEliminar(j.id, j.username)" fill="clear" style="--color: #eb445a;">
          <ion-icon name="trash-outline" slot="icon-only"></ion-icon>
        </ion-button>
      </ion-buttons>

    </ion-item>
  </ion-list>

  <div class="ion-padding" style="margin-top: 20px; margin-bottom: 100px;">
    <app-paginacion 
      *ngIf="total > 0" 
      [total]="total" 
      [porPagina]="20"
      (click)="pagina($event)">
    </app-paginacion>
    
    <p *ngIf="total === 0" style="color: #666; text-align: center; font-size: 0.9em;">
      No se encontraron jugadores.
    </p>
  </div>

  <ion-fab slot="fixed" vertical="bottom" horizontal="center">
    <ion-fab-button (click)="nuevo()" color="tertiary">
      <ion-icon name="add" color="dark"></ion-icon>
    </ion-fab-button>
  </ion-fab>
</ion-content>
