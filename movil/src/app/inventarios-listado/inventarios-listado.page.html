<app-toolbar nombre="Inventarios" color="light"></app-toolbar>

<ion-content>
  <!-- Cabecera de Sección -->
  <div class="mc-section-header">
    <h1 class="mc-title">REVISA<br>LOS BOLSOS</h1>
    <div class="mc-divider"></div>
  </div>

  <div class="ion-padding-horizontal">
    <ion-searchbar 
      [debounce]="1000" 
      (ionInput)="handleInput($event)" 
      placeholder="Buscar por jugador..."
      class="mc-searchbar">
    </ion-searchbar>
  </div>

  <!-- Listado -->
  <div class="mc-container">
    <div *ngFor="let inv of listaInventarios" class="mc-card">
      <div class="mc-card-header">
        <h2 class="mc-card-title">{{ inv.jugador?.username || 'Sin dueño' }}</h2>
      </div>
      
      <p class="mc-card-seed">ÍTEM: {{ inv.item?.nombre }}</p>
      <p class="mc-card-seed" style="color: #1b5e20;">CANTIDAD: {{ inv.cantidad }}</p>

      <div class="mc-card-actions" style="margin-top: 15px;">
        <button class="mc-btn btn-primary" (click)="irAlDetalle(inv.id)">
          VER DETALLES
        </button>
        <button class="mc-btn btn-secondary" (click)="abrirModalCrear(inv.id)">
          EDITAR
        </button>
        <button class="mc-btn btn-danger" (click)="alertEliminar(inv.id)">
          ELIMINAR
        </button>
      </div>
    </div>
  </div>

  <div style="margin-top: 20px; margin-bottom: 80px;" class="ion-padding">
    <app-paginacion *ngIf="total > 0" [total]="total" [porPagina]="20" (click)="pagina($event)"></app-paginacion>
    <p *ngIf="total === 0" class="ion-text-center" style="color: #666; font-weight: bold;">No se encontraron inventarios.</p>
  </div>

  <!-- FAB Cuadrado Estilo Minecraft -->
  <div class="mc-fab" (click)="abrirModalCrear()">
    <ion-icon name="add"></ion-icon>
  </div>
</ion-content>
