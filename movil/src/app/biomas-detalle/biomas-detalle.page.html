<ion-header class="ion-no-border">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/biomas-listado" color="success" text=""></ion-back-button>
    </ion-buttons>
    <ion-title class="mc-toolbar-title">BIOMAS</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content *ngIf="bioma">
  <!-- Cabecera Principal -->
  <div class="mc-detail-header">
    <div class="mc-header-container">
      <p class="mc-overline">EXPLORANDO ECOSISTEMA</p>
      <h1 class="mc-main-title">{{ bioma.nombre }}</h1>
    </div>
  </div>

  <!-- Bloques de Información -->
  <div class="mc-info-grid">
    <div class="mc-info-block block-white">
      <p class="mc-info-label">TEMPERATURA</p>
      <p class="mc-info-value">{{ bioma.temperatura }}°C</p>
    </div>
    
    <div class="mc-info-block block-grey" *ngIf="bioma.mundo && bioma.mundo.nombre">
      <p class="mc-info-label">MUNDO DE ORIGEN</p>
      <p class="mc-info-value">{{ bioma.mundo.nombre }}</p>
    </div>
  </div>

  <!-- Sección de Mobs -->
  <div class="mc-biomas-section">
    <div class="mc-section-title-container">
      <h2 class="mc-section-title">MOBS HABITANTES</h2>
      <div class="mc-title-line"></div>
    </div>

    <div class="mc-biomas-list">
      <div *ngIf="bioma.mobs && bioma.mobs.length > 0; else noMobs">
        <div *ngFor="let mob of bioma.mobs" class="bioma-item" style="display: flex; justify-content: space-between; align-items: center;">
          <span>{{ mob.tipo }}</span>
          <span [style.color]="mob.es_hostil == 1 ? '#c0392b' : '#2a7a4a'" style="font-size: 0.8rem; font-weight: 800;">
            {{ mob.es_hostil == 1 ? 'HOSTIL' : 'PASIVO' }}
          </span>
        </div>
      </div>
      <ng-template #noMobs>
        <p class="empty-msg">Este bioma parece estar deshabitado por ahora.</p>
      </ng-template>
    </div>
  </div>
</ion-content>
