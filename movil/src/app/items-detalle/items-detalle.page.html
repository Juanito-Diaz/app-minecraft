<ion-header class="ion-no-border">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/items-listado" color="success" text=""></ion-back-button>
    </ion-buttons>
    <ion-title class="mc-toolbar-title">ÍTEMS</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content *ngIf="item">
  <!-- Cabecera Principal -->
  <div class="mc-detail-header">
    <div class="mc-header-container">
      <p class="mc-overline">DETALLES DEL ÍTEM</p>
      <h1 class="mc-main-title">{{ item.nombre }}</h1>
    </div>
  </div>

  <!-- Bloques de Información -->
  <div class="mc-info-grid">
    <div class="mc-info-block block-white">
      <p class="mc-info-label">DAÑO BASE</p>
      <p class="mc-info-value">{{ item.puntos_ataque || 0 }}</p>
    </div>
    
    <div class="mc-info-block block-grey">
      <p class="mc-info-label">APILABLE</p>
      <p class="mc-info-value">{{ item.es_apilable == 1 ? 'SÍ' : 'NO' }}</p>
    </div>
  </div>

  <!-- Sección de Jugadores -->
  <div class="mc-biomas-section">
    <div class="mc-section-title-container">
      <h2 class="mc-section-title">POSEEDORES</h2>
      <div class="mc-title-line"></div>
    </div>

    <div class="mc-biomas-list">
      <div *ngIf="item.inventarios && item.inventarios.length > 0; else noDuenos">
        <div *ngFor="let inv of item.inventarios" class="bioma-item" style="display: flex; justify-content: space-between; align-items: center;">
          <span>{{ inv.jugador?.username || 'Desconocido' }}</span>
          <span style="color: #2a7a4a; font-size: 0.8rem; font-weight: 800;">
            CANTIDAD: x{{ inv.cantidad }}
          </span>
        </div>
      </div>
      <ng-template #noDuenos>
        <p class="empty-msg">Nadie posee este ítem aún.</p>
      </ng-template>
    </div>
  </div>

</ion-content>

<ion-content *ngIf="!item" class="ion-padding">
  <p style="text-align: center; color: #666;">Cargando...</p>
</ion-content>
